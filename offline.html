<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ऑफ़लाइन — श्री आदिशक्ति प्रकाशन</title>
<meta name="robots" content="noindex">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #260607;
    color: #fdf3e2;
    font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
    text-align: center;
    padding: 24px;
  }
  .card { max-width: 480px; }
  .om { font-size: 1.6rem; color: #d4a24c; margin-bottom: 18px; }
  h1 { font-size: 1.5rem; margin: 0 0 14px; color: #f2d59a; }
  p { font-size: 1rem; line-height: 1.7; color: rgba(253,243,226,0.85); margin: 0 0 10px; }
  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 28px;
    border-radius: 30px;
    background: linear-gradient(120deg, #d4a24c, #e6be6f);
    color: #260607;
    font-weight: 700;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="om">ॐ नमो श्री भगवती जगदम्बिके दुर्गायै नमः</div>
    <h1>आप अभी ऑफ़लाइन हैं / You Are Offline</h1>
    <p>इंटरनेट कनेक्शन उपलब्ध नहीं है। कृपया अपना कनेक्शन जाँचें और पुनः प्रयास करें।</p>
    <p>No internet connection is available right now. Please check your connection and try again.</p>
    <a href="/" class="btn" onclick="location.reload(); return false;">पुनः प्रयास करें / Try Again</a>
  </div>
</body>
</html>
